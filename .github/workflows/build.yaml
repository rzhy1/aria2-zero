on:
  workflow_dispatch:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"
  release:
    types:
      - released
  schedule:
    - cron: "0 0 * * *"
    
jobs:
  build-aria2c_windows:
    runs-on: windows-2025-vs2026
    env:
      XMAKE_GLOBALDIR: ${{ github.workspace }}\.xmake
    steps:
      - uses: actions/checkout@v6
      - name: Clear xmake cache
        shell: cmd
        run: |
          if exist "%LOCALAPPDATA%\.xmake" rmdir /s /q "%LOCALAPPDATA%\.xmake"
          if exist ".xmake" rmdir /s /q ".xmake"
      #- name: Setup MSVC
      #  uses: microsoft/setup-msbuild@v3
      - name: Modify files
        shell: pwsh
        run: |
          $filePath1 = "$env:GITHUB_WORKSPACE\src\parser\OptionHandlerFactory.cc"
          $filePath2 = "$env:GITHUB_WORKSPACE\xmake.lua"
          (Get-Content -Path $filePath1) -replace '"1", 1, 16, ''x''', '"1", 1, 1024, ''x''' | Set-Content -Path $filePath1
          (Get-Content -Path $filePath1) -replace 'PREF_PIECE_LENGTH, TEXT_PIECE_LENGTH, "1M", 1_m, 1_g', 'PREF_PIECE_LENGTH, TEXT_PIECE_LENGTH, "1K", 1_k, 1_g' | Set-Content -Path $filePath1
          (Get-Content -Path $filePath2) -replace 'local PROJECT_VERSION = os.getenv\("VERSION"\) or "1.37.0-development"', 'local PROJECT_VERSION = "1.37.0"' | Set-Content -Path $filePath2
      - name: xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
      - name: build x64
        run: |
          xmake g --clean
          xmake config -p windows -a x64 -m release --ssl_external=y --use_quictls=n  --require=no -c -y
          # 此时依赖仓库已下载。在全局 .xmake 目录中深度检索 files-*.lua 并克隆生成 4.3.2 配置
          $latestFiles = Get-ChildItem -Path "$env:XMAKE_GLOBALDIR" -Recurse -Filter "files-*.lua" -Force | Sort-Object Name -Descending | Select-Object -First 1
          if ($latestFiles) {
              $destFile = Join-Path $latestFiles.DirectoryName "files-4.3.2.lua"
              Copy-Item $latestFiles.FullName $destFile -Force
              Write-Host "已在全局仓库中自动复制并生成配置文件: $($latestFiles.FullName) -> $destFile"
          } else {
              Write-Host "警告：在全局目录中未找到任何用于模板的 files-*.lua 文件！"
          }
          
          # 4) 【步骤 C：在配置完成后热修复 aarch64 路径】
          # 扫描全局 .xmake 目录下的所有配置脚本，将陈旧的 aarch64 替换为 arm64 架构路径
          Get-ChildItem -Path "$env:XMAKE_GLOBALDIR" -Recurse -Filter "*.lua" -Force | ForEach-Object {
              if (Select-String -Path $_.FullName -Pattern "aarch64") {
                  (Get-Content $_.FullName) -replace "aarch64", "arm64" | Set-Content $_.FullName -Force
                  Write-Host "已自动修复全局依赖脚本中的旧版架构定义: $_.FullName"
              }
          }
          xmake config --require=yes -y
          xmake -j4 -y
          Get-ChildItem -Recurse -Filter aria2c.exe | ForEach-Object {
             $newPath = Join-Path $_.DirectoryName "aria2c0.exe"
             Move-Item $_.FullName $newPath -Force
          }
      - uses: actions/upload-artifact@v7
        with:
          name: aria2c-windows-${{ github.run_id }}
          path: build\**\aria2c0.exe
          if-no-files-found: error
          retention-days: 1

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: aria2c-1.37.0
          allowUpdates: true
          artifacts:  build\**\aria2c0.exe
          token: ${{ secrets.GITHUB_TOKEN }}
