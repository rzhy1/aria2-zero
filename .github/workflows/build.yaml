name: Build aria2c with multiple SSL backends

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"
  release:
    types:
      - released

jobs:
  # ==========================================
  # 阶段一：并行编译任务
  # ==========================================
  build-aria2c-windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        ssl: [wintls, libressl, quictls, openssl]
    env:
      XMAKE_GLOBALDIR: ${{ github.workspace }}\.xmake
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Disable Windows Defender
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true -DisableIOAVProtection $true
          Write-Host "已关闭 Windows Defender 功能！"
          
      - name: Clean up system OpenSSL to prevent linker pollution
        shell: pwsh
        run: |
          $knownPaths = @(
              # 1. 虚拟机内置 OpenSSL 深度嵌套目录
              "C:\Program Files\OpenSSL\lib\VC\x64\MD\libcrypto.lib",
              "C:\Program Files\OpenSSL\lib\VC\x64\MD\libssl.lib",
              "C:\Program Files\OpenSSL\lib\VC\x64\MDd\libcrypto.lib",
              "C:\Program Files\OpenSSL\lib\VC\x64\MDd\libssl.lib",
              "C:\Program Files\OpenSSL\lib\VC\x64\MT\libcrypto.lib",
              "C:\Program Files\OpenSSL\lib\VC\x64\MT\libssl.lib",
              "C:\Program Files\OpenSSL\lib\VC\x64\MTd\libcrypto.lib",
              "C:\Program Files\OpenSSL\lib\VC\x64\MTd\libssl.lib",
              
              # 2. [新增] 彻底切断草莓 Perl 携带的 3.6.0b 静态库干扰！
              "C:\Strawberry\c\lib\libcrypto.a",
              "C:\Strawberry\c\lib\libssl.a",
              "C:\Strawberry\c\lib\libcrypto.dll.a",
              "C:\Strawberry\c\lib\libssl.dll.a",
              
              # 3. Miniconda 的全局库干扰
              "C:\Miniconda\Library\lib\libcrypto.lib",
              "C:\Miniconda\Library\lib\libssl.lib",
              
              # 4. PostgreSQL 数据库的静态库干扰
              "C:\Program Files\PostgreSQL\14\lib\libcrypto.lib",
              "C:\Program Files\PostgreSQL\14\lib\libssl.lib",
              
              # 5. 虚拟机 PyPy 环境干扰
              "C:\hostedtoolcache\windows\PyPy\2.7.18\x86\tcl\libcrypto.lib",
              "C:\hostedtoolcache\windows\PyPy\2.7.18\x86\tcl\libssl.lib",
              "C:\hostedtoolcache\windows\PyPy\3.10.16\x86\tcl\libcrypto.lib",
              "C:\hostedtoolcache\windows\PyPy\3.10.16\x86\tcl\libssl.lib",
              "C:\hostedtoolcache\windows\PyPy\3.7.13\x86\tcl\libcrypto.lib",
              "C:\hostedtoolcache\windows\PyPy\3.7.13\x86\tcl\libssl.lib",
              "C:\hostedtoolcache\windows\PyPy\3.8.16\x86\tcl\libcrypto.lib",
              "C:\hostedtoolcache\windows\PyPy\3.8.16\x86\tcl\libssl.lib",
              "C:\hostedtoolcache\windows\PyPy\3.9.19\x86\tcl\libcrypto.lib",
              "C:\hostedtoolcache\windows\PyPy\3.9.19\x86\tcl\libssl.lib"
          )
          
          Write-Host "开始对已知系统 OpenSSL 路径进行精准屏蔽（耗时 < 0.1 秒）..."
          
          $foundCount = 0
          foreach ($path in $knownPaths) {
              if (Test-Path $path) {
                  $foundCount++
                  try {
                      Rename-Item -Path $path -NewName ((Split-Path $path -Leaf) + ".bak") -Force -ErrorAction SilentlyContinue
                      Write-Host "成功屏蔽: $path -> $path.bak"
                  } catch {
                      Write-Host "屏蔽失败 $path : $_"
                  }
              }
          }
          Write-Host "系统屏蔽阶段执行完毕。共屏蔽 $foundCount 个冲突文件。"
          
      - name: Modify source files
        shell: pwsh
        run: |
          $filePath1 = "$env:GITHUB_WORKSPACE\src\parser\OptionHandlerFactory.cc"
          $filePath2 = "$env:GITHUB_WORKSPACE\xmake.lua"
          (Get-Content -Path $filePath1) -replace '"1", 1, 16, ''x''', '"1", 1, 1024, ''x''' | Set-Content -Path $filePath1
          (Get-Content -Path $filePath1) -replace 'PREF_PIECE_LENGTH, TEXT_PIECE_LENGTH, "1M", 1_m, 1_g', 'PREF_PIECE_LENGTH, TEXT_PIECE_LENGTH, "1K", 1_k, 1_g' | Set-Content -Path $filePath1
          (Get-Content -Path $filePath2) -replace 'local PROJECT_VERSION = os.getenv\("VERSION"\) or "1.37.0-development"', 'local PROJECT_VERSION = "1.37.0"' | Set-Content -Path $filePath2
      
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          
      - name: Compile Windows version (${{ matrix.ssl }})
        shell: pwsh
        run: |
          xmake clean -a
          xmake config -p windows -a x64 -m release --ssl_provider=${{ matrix.ssl }} -c -y
          xmake -j4 -y
          # ==========================================================
          # 深度诊断：在编译成功后，所有的依赖包物理安装完毕后执行
          # ==========================================================
          Write-Host "================== [ 诊断阶段 1: 检查 Xmake 依赖包物理路径 ] =================="
          xmake require --info openssl3
          xmake require --info libssh2

          Write-Host "================== [ 诊断阶段 2: 查找并解析工作区 opensslv.h 头文件 ] =================="
          $opensslvHeaders = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Recurse -Filter "opensslv.h" -ErrorAction SilentlyContinue
          if ($opensslvHeaders) {
              foreach ($header in $opensslvHeaders) {
                  Write-Host "找到工作区解压头文件: $($header.FullName)"
                  Get-Content $header.FullName | Select-String "OPENSSL_VERSION_TEXT", "OPENSSL_VERSION_STR", "OPENSSL_VERSION_MAJOR"
              }
          } else {
              Write-Host "未在工作区找到 opensslv.h"
          }

          Write-Host "================== [ 诊断阶段 3: 提取 Xmake 下载的 libcrypto.lib 二进制版本号 ] =================="
          $libcryptoLibs = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Recurse -Filter "libcrypto.lib" -ErrorAction SilentlyContinue
          if ($libcryptoLibs) {
              foreach ($lib in $libcryptoLibs) {
                  Write-Host "找到工作区静态库: $($lib.FullName)"
                  # 扫描二进制文件，提取硬编码的 OpenSSL 版本文本
                  $versionMatch = Select-String -Path $lib.FullName -Pattern "OpenSSL\s+3\.[0-9a-zA-Z\.\-]+" -AllMatches -ErrorAction SilentlyContinue
                  if ($versionMatch) {
                      $versionMatch.Matches | ForEach-Object { Write-Host "  -> 该静态库内嵌二进制版本串: $($_.Value)" }
                  }
              }
          } else {
              Write-Host "未在工作区找到 libcrypto.lib"
          }

          Write-Host "================== [ 诊断阶段 4: 实时探测并分析虚拟机隐藏路径中的 libcrypto.lib ] =================="
          # 列出所有可能在虚拟机深处对链接器造成污染的物理路径
          $suspectPaths = @(
              "C:\Program Files\OpenSSL\lib\VC\x64\MT\libcrypto.lib",
              "C:\Program Files\OpenSSL\lib\VC\x64\MTd\libcrypto.lib",
              "C:\Program Files\OpenSSL\lib\VC\x64\MD\libcrypto.lib",
              "C:\Program Files\OpenSSL\lib\VC\x64\MDd\libcrypto.lib",
              "C:\Miniconda\Library\lib\libcrypto.lib",
              "C:\Program Files\PostgreSQL\14\lib\libcrypto.lib"
          )
          foreach ($path in $suspectPaths) {
              if (Test-Path $path) {
                  Write-Host "⚠️ 警告：检测到虚拟机系统级库未被屏蔽: $path"
                  # 核心亮点：直接去提取这个系统文件的真实硬编码版本号！
                  $sysVersionMatch = Select-String -Path $path -Pattern "OpenSSL\s+3\.[0-9a-zA-Z\.\-]+" -AllMatches -ErrorAction SilentlyContinue
                  if ($sysVersionMatch) {
                      $sysVersionMatch.Matches | ForEach-Object { Write-Host "  -> 该系统隐藏库的真实物理版本为: $($_.Value)" }
                  }
              } else {
                  Write-Host "安全：未发现路径 $path（已成功重命名屏蔽或不存在）"
              }
          }

          Write-Host "================== [ 诊断阶段 5: 检查 MSVC 链接器环境变量污染 ] =================="
          Write-Host "PATH 环境变量中的 OpenSSL 干扰:"
          where.exe openssl 2>$null
          Write-Host "当前执行环境的 PATH:"
          Write-Host "$env:PATH"

          New-Item -ItemType Directory -Force -Path "staging"
          $targetExe = Get-ChildItem -Recurse -Filter "aria2c.exe" | Select-Object -First 1
          if ($targetExe) {
              $newName = "aria2c0-${{ matrix.ssl }}.exe"
              Move-Item -Path $targetExe.FullName -Destination "staging\$newName" -Force
              Write-Host "成功生成并重命名: staging\$newName"
          } else {
              Write-Error "错误：未找到生成的 aria2c.exe"
              exit 1
          }

      - name: Upload temporary artifact
        uses: actions/upload-artifact@v7
        with:
          name: aria2c-bin-${{ matrix.ssl }}
          path: staging\aria2c0-${{ matrix.ssl }}.exe
          retention-days: 1

  # ==========================================
  # 阶段二：合并并上传任务（独立运行：即使部分平台失败也继续执行）
  # ==========================================
  upload-release:
    needs: build-aria2c-windows
    if: always() && !cancelled()  # 确保哪怕 build-aria2c-windows 部分报错也始终执行此步骤
    runs-on: ubuntu-latest
    steps:
      # 安全地下载当前工作流所有已成功上传的临时二进制
      - name: Download all temporary artifacts
        uses: actions/download-artifact@v8
        with:
          path: out
          merge-multiple: true # 将各平台分散的二进制安全汇聚

      # 检测是否有成功编译出的二进制文件
      - name: Check if there are any binaries to release
        id: check_files
        run: |
          if ls out/aria2c0-*.exe 1> /dev/null 2>&1; then
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "成功找到以下生成的构建版本："
            ls -la out/aria2c0-*.exe
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "未探测到任何成功编译的二进制产物。"
          fi

      # 仅在有可用文件时上传打包
      - name: Upload consolidated Artifact
        if: steps.check_files.outputs.has_files == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: aria2c-windows-all
          path: out/aria2c0-*.exe
          if-no-files-found: error
          retention-days: 7

      # 仅在有可用文件时上传至 Release
      - name: Upload to GitHub Release
        if: |
          github.event_name != 'pull_request' && 
          steps.check_files.outputs.has_files == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: aria2c-1.37.0
          allowUpdates: true
          artifacts: out/aria2c0-*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
