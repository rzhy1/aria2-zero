name: Build aria2c with multiple SSL backends

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"
  release:
    types:
      - released

jobs:
  # ==========================================
  # 阶段一：并行编译任务
  # ==========================================
  build-aria2c-windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        ssl: [wintls, libressl, quictls, openssl]
    env:
      XMAKE_GLOBALDIR: ${{ github.workspace }}\.xmake
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install NASM and Strawberry Perl via Chocolatey
        run: |
          choco install nasm strawberryperl -y

      - name: Disable Windows Defender
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true -DisableIOAVProtection $true
          Write-Host "已关闭 Windows Defender 功能！"

      - name: Modify source files
        shell: pwsh
        run: |
          $filePath1 = "$env:GITHUB_WORKSPACE\src\parser\OptionHandlerFactory.cc"
          $filePath2 = "$env:GITHUB_WORKSPACE\xmake.lua"
          (Get-Content -Path $filePath1) -replace '"1", 1, 16, ''x''', '"1", 1, 1024, ''x''' | Set-Content -Path $filePath1
          (Get-Content -Path $filePath1) -replace 'PREF_PIECE_LENGTH, TEXT_PIECE_LENGTH, "1M", 1_m, 1_g', 'PREF_PIECE_LENGTH, TEXT_PIECE_LENGTH, "1K", 1_k, 1_g' | Set-Content -Path $filePath1
          (Get-Content -Path $filePath2) -replace 'local PROJECT_VERSION = os.getenv\("VERSION"\) or "1.37.0-development"', 'local PROJECT_VERSION = "1.37.0"' | Set-Content -Path $filePath2
      
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          
      - name: Update xmake repository index
        run: |
          xmake repo -u
          
      - name: Compile Windows version (${{ matrix.ssl }})
        shell: pwsh
        run: |
          # 重新配置并执行编译
          xmake config -p windows -a x64 -m release --ssl_provider=${{ matrix.ssl }} -c -y
          xmake -j4 -y
          
          # 创建独立的暂存文件夹以供打包
          New-Item -ItemType Directory -Force -Path "staging"
          
          $targetExe = Get-ChildItem -Recurse -Filter "aria2c.exe" | Select-Object -First 1
          if ($targetExe) {
              $newName = "aria2c0-${{ matrix.ssl }}.exe"
              Move-Item -Path $targetExe.FullName -Destination "staging\$newName" -Force
              Write-Host "成功生成并重命名: staging\$newName"
          } else {
              Write-Error "错误：未找到生成的 aria2c.exe"
              exit 1
          }

      # 只有当前编译成功，才会上传临时二进制 (保留 1 天)
      - name: Upload temporary artifact
        uses: actions/upload-artifact@v7
        with:
          name: aria2c-bin-${{ matrix.ssl }}
          path: staging\aria2c0-${{ matrix.ssl }}.exe
          retention-days: 1

  # ==========================================
  # 阶段二：合并并上传任务（独立运行：即使部分平台失败也继续执行）
  # ==========================================
  upload-release:
    needs: build-aria2c-windows
    if: always() && !cancelled()  # 确保哪怕 build-aria2c-windows 部分报错也始终执行此步骤
    runs-on: ubuntu-latest
    steps:
      # 安全地下载当前工作流所有已成功上传的临时二进制
      - name: Download all temporary artifacts
        uses: actions/download-artifact@v8
        with:
          path: out
          merge-multiple: true # 将各平台分散的二进制安全汇聚

      # 检测是否有成功编译出的二进制文件
      - name: Check if there are any binaries to release
        id: check_files
        run: |
          if ls out/aria2c0-*.exe 1> /dev/null 2>&1; then
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "成功找到以下生成的构建版本："
            ls -la out/aria2c0-*.exe
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "未探测到任何成功编译的二进制产物。"
          fi

      # 仅在有可用文件时上传打包
      - name: Upload consolidated Artifact
        if: steps.check_files.outputs.has_files == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: aria2c-windows-all
          path: out/aria2c0-*.exe
          if-no-files-found: error
          retention-days: 7

      # 仅在有可用文件时上传至 Release
      - name: Upload to GitHub Release
        if: |
          github.event_name != 'pull_request' && 
          steps.check_files.outputs.has_files == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: aria2c-1.37.0
          allowUpdates: true
          artifacts: out/aria2c0-*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
